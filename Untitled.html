<html>
    <head>
        <script language="javascript">
            function WriteToFile()
            { 
               var a = document.createElement("a");
a.download = "demo.txt";
a.href = window.URL.createObjectURL(new Blob(["CONTENT"], {type: "text/plain"}));
a.click();
             }
         </script>
    </head>
   <body onLoad="WriteToFile()">
   </body>
</html>
